<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Üretimin Geleceği | Admin Dashboard</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; }
        .sidebar { width: 450px; background: #111; padding: 40px; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar h2 { margin-top: 0; font-size: 24px; margin-bottom: 5px; }
        .status-text { color: #a1a1aa; font-size: 13px; margin-bottom: 30px; display: block; }
        label { font-size: 11px; color: #a1a1aa; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea { width: 100%; padding: 12px; margin-bottom: 20px; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 6px; font-family: inherit; }
        input[type="file"] { width: 100%; padding: 10px; margin-bottom: 10px; background: #0a0a0a; border: 1px dashed #444; color: #a1a1aa; border-radius: 6px; }
        
        .btn-submit { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-submit:hover { background: #ccc; }
        
        .btn-cancel { width: 100%; padding: 15px; background: #333; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; display: none; }
        .btn-cancel:hover { background: #444; }

        .content { flex: 1; padding: 40px; overflow-y: auto; background: #0a0a0a; }
        .haber-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .haber-card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 20px; display: flex; flex-direction: column; }
        .gorsel-onizleme { width: 100%; height: 180px; background-size: contain; background-repeat: no-repeat; background-position: center; border-radius: 4px; margin-bottom: 15px; background-color: #050505; }
        
        .action-buttons { display: flex; gap: 10px; margin-top: auto; padding-top: 15px; }
        .btn-edit { flex: 1; padding: 8px; background: #003a66; color: #fff; border: 1px solid #005599; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-edit:hover { background: #004a80; }
        .btn-delete { flex: 1; padding: 8px; background: #4a0000; color: #fff; border: 1px solid #6a0000; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-delete:hover { background: #6a0000; }
        
        /* Çoklu Önizleme Alanı Stilleri */
        .preview-box { background:#1a1a1a; padding:5px; border:1px solid #333; border-radius:4px; text-align:center; width:110px; }
        .preview-box img { width:100%; height:70px; object-fit:contain; margin-bottom:5px; background:#000; }
        .preview-controls { display:flex; justify-content:space-between; margin-bottom:5px; }
        .preview-btn { padding:2px 8px; cursor:pointer; background:#333; color:white; border:none; border-radius:3px; }
        .preview-btn:hover { background:#555; }
        .delete-btn { width:100%; background:#4a0000; color:white; border:none; padding:4px; font-size:10px; cursor:pointer; border-radius:3px; font-weight:bold;}
        .delete-btn:hover { background:#6a0000; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 id="formBaslik">Medya Ekle</h2>
        <span class="status-text">Üretimin Geleceği Haber Yönetim Paneli</span>
        
        <label>Etiket (Kategori)</label>
        <input type="text" id="etiket" placeholder="Örn: DUYURU">
        
        <label>Haber Başlığı</label>
        <input type="text" id="baslik" placeholder="Başlık yazın...">
        
        <label>İçerik Metni</label>
        <textarea id="metin" rows="5" placeholder="Haber metnini girin... Her fotoğraf değiştiğinde yazının da değişmesini istiyorsanız paragrafları '---' ile ayırın."></textarea>
        
        <label style="color:#fff;">1. Kapak Fotoğrafı (Opsiyonel)</label>
        <label>Seçilmezse slider'daki ilk fotoğraf vitrin fotoğrafı olur. Ana sayfada görünür, kaydırmalı fotoğrafların arasına karışmaz.</label>
        <input type="file" id="kapakGorsel" accept="image/*">
        <div id="kapakOnizleme" style="margin-bottom: 20px;"></div>
        
        <label style="color:#fff;">2. Kaydırmalı Haber Fotoğrafları (Galerİ)</label>
        <label>Instagram gönderisi gibi sağa sola kaydırılacak ana görseller (Birden fazla seçebilirsiniz). Sırasını oklarla ayarlayın.</label>
        <input type="file" id="galeriGorseller" accept="image/*" multiple>
        <div id="galeriOnizleme" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 30px;"></div>
        
        <button class="btn-submit" id="submitBtn" onclick="formuGonder()">YAYINLA</button>
        <button class="btn-cancel" id="iptalBtn" onclick="iptalEt()">İPTAL ET</button>
    </div>

    <div class="content">
        <h3>Yayındaki İçerikler</h3>
        <div class="haber-grid" id="duyuruListesi"></div>
    </div>

    <script>
        // Şifre kontrolü
        const giris = prompt("Yönetici Şifresi:");
        if(giris !== "FOTM2026") {
            document.write("<h2>Erişim Reddedildi</h2>");
            window.stop();
        }

        const S_URL = "https://tzdpljzkzvejdaydcwwi.supabase.co/rest/v1/duyurular";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6ZHBsanprenZlamRheWRjd3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDc5MjEsImV4cCI6MjA5MjI4MzkyMX0.BkSThURX33Spc2Ir5CjLpGZeueJ0pN-ZuznARP64g4s"; 

        const headers = { 
            "apikey": S_KEY, 
            "Authorization": `Bearer ${S_KEY}`, 
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        };

        let tumDuyurular = [];
        let guncellenecekId = null;

        // Medya Durumu İçin Değişkenler
        let kapakBase64 = "";
        let galeriBase64 = [];

        window.onload = duyurulariYukle;

        function parseGorsel(gorselStr) {
            if (!gorselStr) return { kapak: "", galeri: [] };
            if (gorselStr.trim().startsWith('{')) {
                try { return JSON.parse(gorselStr); } 
                catch(e) { return { kapak: gorselStr, galeri: [] }; }
            }
            return { kapak: gorselStr, galeri: [] };
        }

        async function duyurulariYukle() {
            try {
                const res = await fetch(`${S_URL}?select=*&order=id.desc`, { headers });
                tumDuyurular = await res.json();
                const listeDiv = document.getElementById('duyuruListesi');
                listeDiv.innerHTML = tumDuyurular.length ? '' : '<p style="color:#666;">Henüz yayınlanmış bir haber yok.</p>';

                tumDuyurular.forEach(d => {
                    const pGorsel = parseGorsel(d.gorsel);
                    const onizlemeResmi = pGorsel.kapak || (pGorsel.galeri.length > 0 ? pGorsel.galeri[0] : null);
                    
                    const img = onizlemeResmi ? `<div class="gorsel-onizleme" style="background-image: url('${onizlemeResmi}')"></div>` : '';
                    
                    listeDiv.innerHTML += `
                        <div class="haber-card">
                            ${img}
                            <span style="font-size:10px; color:#aaa; text-transform:uppercase;">${d.etiket}</span>
                            <h4 style="margin: 5px 0;">${d.baslik}</h4>
                            <div class="action-buttons">
                                <button class="btn-edit" onclick="duzenlemeModunaGec(${d.id})">DÜZENLE</button>
                                <button class="btn-delete" onclick="duyuruSil(${d.id})">SİL</button>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error("Yükleme hatası:", e); }
        }

        /* DOSYA YÜKLEME VE ÖNİZLEME MANTIĞI */
        document.getElementById('kapakGorsel').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                kapakBase64 = await fileToBase64(file);
                renderKapak();
            }
        });

        document.getElementById('galeriGorseller').addEventListener('change', async (e) => {
            const files = e.target.files;
            for(let i = 0; i < files.length; i++) {
                const b64 = await fileToBase64(files[i]);
                galeriBase64.push(b64);
            }
            renderGaleri();
            // Dosya inputunu sıfırla ki aynı dosyayı bir daha seçmek isterse seçebilsin
            e.target.value = ''; 
        });

        function fileToBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        function renderKapak() {
            const div = document.getElementById('kapakOnizleme');
            if (kapakBase64) {
                div.innerHTML = `
                    <div class="preview-box" style="width:150px;">
                        <img src="${kapakBase64}">
                        <button type="button" class="delete-btn" onclick="silKapak()">KAPAK İPTAL</button>
                    </div>`;
            } else {
                div.innerHTML = '';
            }
        }

        function silKapak() {
            kapakBase64 = "";
            document.getElementById('kapakGorsel').value = "";
            renderKapak();
        }

        function renderGaleri() {
            const div = document.getElementById('galeriOnizleme');
            div.innerHTML = '';
            galeriBase64.forEach((b64, index) => {
                div.innerHTML += `
                    <div class="preview-box">
                        <img src="${b64}">
                        <div class="preview-controls">
                            <button type="button" class="preview-btn" onclick="tasGaleri(${index}, -1)">&lt;</button>
                            <span style="font-size:11px; font-weight:bold; color:#fff; line-height:20px;">${index + 1}</span>
                            <button type="button" class="preview-btn" onclick="tasGaleri(${index}, 1)">&gt;</button>
                        </div>
                        <button type="button" class="delete-btn" onclick="silGaleri(${index})">SİL</button>
                    </div>`;
            });
        }

        function tasGaleri(index, yon) {
            if (index + yon < 0 || index + yon >= galeriBase64.length) return;
            const temp = galeriBase64[index];
            galeriBase64[index] = galeriBase64[index + yon];
            galeriBase64[index + yon] = temp;
            renderGaleri();
        }

        function silGaleri(index) {
            galeriBase64.splice(index, 1);
            renderGaleri();
        }

        function duzenlemeModunaGec(id) {
            const d = tumDuyurular.find(x => x.id === id);
            if(!d) return;

            guncellenecekId = id;
            document.getElementById('formBaslik').innerText = "Medyayı Güncelle";
            document.getElementById('etiket').value = d.etiket || '';
            document.getElementById('baslik').value = d.baslik || '';
            document.getElementById('metin').value = d.metin || '';
            document.getElementById('kapakGorsel').value = ''; 
            document.getElementById('galeriGorseller').value = ''; 
            
            const pGorsel = parseGorsel(d.gorsel);
            kapakBase64 = pGorsel.kapak || "";
            galeriBase64 = pGorsel.galeri || [];
            
            renderKapak();
            renderGaleri();
            
            document.getElementById('submitBtn').innerText = "GÜNCELLE";
            document.getElementById('iptalBtn').style.display = "block";
            
            // Kullanıcıyı en üste kaydır
            document.querySelector('.sidebar').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function iptalEt() {
            guncellenecekId = null;
            document.getElementById('formBaslik').innerText = "Medya Ekle";
            document.getElementById('etiket').value = '';
            document.getElementById('baslik').value = '';
            document.getElementById('metin').value = '';
            document.getElementById('kapakGorsel').value = '';
            document.getElementById('galeriGorseller').value = '';
            
            kapakBase64 = "";
            galeriBase64 = [];
            renderKapak();
            renderGaleri();
            
            document.getElementById('submitBtn').innerText = "YAYINLA";
            document.getElementById('iptalBtn').style.display = "none";
        }

        async function formuGonder() {
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.innerText = "İŞLENİYOR...";
            submitBtn.disabled = true;

            const veri = {
                etiket: document.getElementById('etiket').value,
                baslik: document.getElementById('baslik').value,
                metin: document.getElementById('metin').value
            };

            // Görselleri JSON objesi olarak stringe çevir
            if (!kapakBase64 && galeriBase64.length === 0) {
                veri.gorsel = "";
            } else {
                veri.gorsel = JSON.stringify({ kapak: kapakBase64, galeri: galeriBase64 });
            }

            let fetchUrl = S_URL;
            let fetchMethod = 'POST';

            if (guncellenecekId !== null) {
                fetchUrl = `${S_URL}?id=eq.${guncellenecekId}`;
                fetchMethod = 'PATCH';
            }

            try {
                const res = await fetch(fetchUrl, { 
                    method: fetchMethod, 
                    headers: headers, 
                    body: JSON.stringify(veri) 
                });

                if(res.ok) {
                    alert(guncellenecekId ? "Haber başarıyla güncellendi!" : "Haber başarıyla yayınlandı!");
                    location.reload();
                } else {
                    const err = await res.json();
                    alert("Hata: " + err.message);
                    submitBtn.innerText = guncellenecekId ? "GÜNCELLE" : "YAYINLA";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                alert("Bağlantı hatası yaşandı!");
                submitBtn.innerText = guncellenecekId ? "GÜNCELLE" : "YAYINLA";
                submitBtn.disabled = false;
            }
        }

        async function duyuruSil(id) {
            if(confirm('Silmek istediğine emin misin?')) {
                await fetch(`${S_URL}?id=eq.${id}`, { method: 'DELETE', headers });
                duyurulariYukle();
                if(guncellenecekId === id) iptalEt();
            }
        }
    </script>
</body>
</html>
