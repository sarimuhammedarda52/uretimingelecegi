<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Üretimin Geleceği | Admin Dashboard</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; }
        .sidebar { width: 400px; background: #111; padding: 40px; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar h2 { margin-top: 0; font-size: 24px; margin-bottom: 5px; }
        .status-text { color: #a1a1aa; font-size: 13px; margin-bottom: 30px; display: block; }
        label { font-size: 11px; color: #a1a1aa; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea { width: 100%; padding: 12px; margin-bottom: 20px; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 6px; font-family: inherit; }
        input[type="file"] { width: 100%; padding: 10px; margin-bottom: 30px; background: #0a0a0a; border: 1px dashed #444; color: #a1a1aa; border-radius: 6px; }
        button.btn-submit { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.btn-submit:hover { background: #ccc; }
        .content { flex: 1; padding: 40px; overflow-y: auto; background: #0a0a0a; }
        .haber-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .haber-card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 20px; }
        .gorsel-onizleme { width: 100%; height: 120px; background-size: cover; background-position: center; border-radius: 4px; margin-bottom: 15px; background-color: #050505; }
        .btn-delete { width: 100%; padding: 8px; background: #4a0000; color: #fff; border: 1px solid #6a0000; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Medya Ekle</h2>
        <span class="status-text">Üretimin Geleceği Haber Yönetim Paneli</span>
        
        <label>Etiket (Kategori)</label>
        <input type="text" id="etiket" placeholder="Örn: DUYURU">
        
        <label>Haber Başlığı</label>
        <input type="text" id="baslik" placeholder="Başlık yazın...">
        
        <label>İçerik Metni</label>
        <textarea id="metin" rows="5" placeholder="Haber metnini girin..."></textarea>
        
        <label>Görsel Yükle</label>
        <input type="file" id="gorsel" accept="image/*">
        
        <button class="btn-submit" id="submitBtn" onclick="formuGonder()">YAYINLA</button>
    </div>

    <div class="content">
        <h3>Yayındaki İçerikler</h3>
        <div class="haber-grid" id="duyuruListesi"></div>
    </div>

    <script>
        // Şifre kontrolü
        const giris = prompt("Yönetici Şifresi:");
        if(giris !== "FOTM2026") {
            document.write("<h2>Erişim Reddedildi</h2>");
            window.stop();
        }

        const S_URL = "https://tzdpljzkzvejdaydcwwi.supabase.co/rest/v1/duyurular";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6ZHBsanprenZlamRheWRjd3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDc5MjEsImV4cCI6MjA5MjI4MzkyMX0.BkSThURX33Spc2Ir5CjLpGZeueJ0pN-ZuznARP64g4s"; 

        const headers = { 
            "apikey": S_KEY, 
            "Authorization": `Bearer ${S_KEY}`, 
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        };

        window.onload = duyurulariYukle;

        async function duyurulariYukle() {
            try {
                const res = await fetch(`${S_URL}?select=*&order=id.desc`, { headers });
                const data = await res.json();
                const listeDiv = document.getElementById('duyuruListesi');
                listeDiv.innerHTML = data.length ? '' : '<p style="color:#666;">Henüz yayınlanmış bir haber yok.</p>';

                data.forEach(d => {
                    const img = d.gorsel ? `<div class="gorsel-onizleme" style="background-image: url('${d.gorsel}')"></div>` : '';
                    listeDiv.innerHTML += `
                        <div class="haber-card">
                            ${img}
                            <span style="font-size:10px; color:#aaa; text-transform:uppercase;">${d.etiket}</span>
                            <h4 style="margin: 5px 0;">${d.baslik}</h4>
                            <button class="btn-delete" onclick="duyuruSil(${d.id})">SİL</button>
                        </div>`;
                });
            } catch (e) { console.error("Yükleme hatası:", e); }
        }

        async function formuGonder() {
            const submitBtn = document.getElementById('submitBtn');
            const file = document.getElementById('gorsel').files[0];
            let gorselVerisi = "";

            submitBtn.innerText = "YAYINLANIYOR...";
            submitBtn.disabled = true;

            if (file) {
                const reader = new FileReader();
                gorselVerisi = await new Promise(r => { reader.onload=()=>r(reader.result); reader.readAsDataURL(file); });
            }

            const veri = {
                etiket: document.getElementById('etiket').value,
                baslik: document.getElementById('baslik').value,
                metin: document.getElementById('metin').value,
                gorsel: gorselVerisi
            };

            const res = await fetch(S_URL, { 
                method: 'POST', 
                headers: headers, 
                body: JSON.stringify(veri) 
            });

            if(res.ok) {
                alert("Haber başarıyla yayınlandı!");
                location.reload();
            } else {
                const err = await res.json();
                alert("Hata: " + err.message);
                submitBtn.innerText = "YAYINLA";
                submitBtn.disabled = false;
            }
        }

        async function duyuruSil(id) {
            if(confirm('Silmek istediğine emin misin?')) {
                await fetch(`${S_URL}?id=eq.${id}`, { method: 'DELETE', headers });
                duyurulariYukle();
            }
        }
    </script>
</body>
</html>
